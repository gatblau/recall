# Release workflow (plan 03 phase 3 — FU-001).
#
# On a `v*` tag: build the one image carrying both binaries, smoke-test it (boot each binary against
# a real Dex via the testcontainers-rs suite), then publish it to GHCR. Publishing is gated behind the
# green smoke, so a broken image never reaches the registry.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub release + generated notes
  packages: write   # push the image to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # The smoke builds `recall:ci` (multi-stage Dockerfile) and boots it as both `recall` and
      # `recall-mcp` against a real dexidp/dex container, asserting /healthz and tools/list. This is
      # the publish gate: a Dockerfile or boot regression fails here before anything is pushed.
      - name: Container smoke (build + boot both binaries against Dex)
        run: cargo test --test container -- --nocapture

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-tag the already-built (and smoke-passed) `recall:ci` image as the GHCR refs and push. No
      # second build — the image the smoke validated is exactly the image published.
      - name: Tag and push image to GHCR
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/recall"
          tag="${GITHUB_REF_NAME}"
          sha="${GITHUB_SHA::12}"
          docker tag recall:ci "${image}:${tag}"
          docker tag recall:ci "${image}:${sha}"
          docker push "${image}:${tag}"
          docker push "${image}:${sha}"
          echo "published ${image}:${tag} and ${image}:${sha}"

      - name: Create GitHub release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
